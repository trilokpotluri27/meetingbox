# Production overrides for MeetingBox
#
# Usage (systemd service applies this automatically):
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml --profile screen up -d
#
# NOTE: profiles: [] does NOT clear the "screen" profile from the base file.
# The --profile screen flag in the systemd ExecStart command is what activates
# device-ui in production. This file adds device passthrough only.

services:
  device-ui:
    devices:
      - /dev/input:/dev/input
      - /dev/dri:/dev/dri
